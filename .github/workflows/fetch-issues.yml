name: Fetch GitHub Issues

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub Organization to fetch issues from'
        required: false
        default: 'variableway'

jobs:
  fetch-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/web
          npm install

      - name: Fetch issues from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ github.event.inputs.org || 'variableway' }}
        run: node scripts/fetch-issues.js

      - name: Generate weekly summary
        run: node scripts/generate-weekly.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet apps/web/data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add apps/web/data/issues.json apps/web/data/sync-state.json
          git commit -m "Update issues data [$(date -u +%Y-%m-%d-%H:%M)]"
          git push
